<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D World Explorer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; }
        #controls { position: absolute; bottom: 30px; left: 20px; display: grid; grid-template-columns: 70px 70px 70px; gap: 10px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; touch-action: none; }
        .btn:active { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div id="ui"><h1>3D Explorer</h1></div>
    <div id="controls">
        <div class="btn" id="up">↑</div>
        <div class="btn" id="left">←</div>
        <div class="btn" id="right">→</div>
        <div class="btn" id="down" style="grid-column: 2;">↓</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ground
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({color: 0x2e7d32}));
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // Player (The 3D Cube)
        const player = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshNormalMaterial());
        player.position.y = 1;
        scene.add(player);

        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        const input = { up: false, down: false, left: false, right: false };
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[btn.id] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[btn.id] = false; });
        });

        function animate() {
            requestAnimationFrame(animate);
            if(input.up) player.position.z -= 0.2;
            if(input.down) player.position.z += 0.2;
            if(input.left) player.position.x -= 0.2;
            if(input.right) player.position.x += 0.2;
            
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 15;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
